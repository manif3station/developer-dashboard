name: Test

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PERL_MM_USE_DEFAULT: 1
      NONINTERACTIVE_TESTING: 1
      PERL_EXTUTILS_AUTOINSTALL: --defaultdeps
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Perl
        uses: shogo82148/actions-setup-perl@8a3e458e34220c3cd62497d8c297eae315b88a72
        with:
          perl-version: '5.38'

      - name: Install dependencies
        run: |
          cpanm --installdeps --notest .
          cpanm --notest Devel::Cover

      - name: Run tests
        run: |
          prove -lr t

      - name: Verify lib coverage
        run: |
          cover -delete
          HARNESS_PERL_SWITCHES=-MDevel::Cover prove -lr t
          report="$(cover -report text -select_re '^lib/' -coverage statement -coverage subroutine)"
          printf '%s\n' "$report"
          printf '%s\n' "$report" | grep -F "Total                                       100.0  100.0  100.0"
