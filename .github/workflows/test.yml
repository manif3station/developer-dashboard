name: Test

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PERL_MM_USE_DEFAULT: 1
      NONINTERACTIVE_TESTING: 1
      PERL_EXTUTILS_AUTOINSTALL: --defaultdeps
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Setup Perl
        uses: shogo82148/actions-setup-perl@8a3e458e34220c3cd62497d8c297eae315b88a72
        with:
          perl-version: '5.38'

      - name: Install dependencies
        run: |
          cpanm --installdeps --notest .
          cpanm --notest Devel::Cover

      - name: Run tests
        run: |
          prove -lr t

      - name: Verify lib coverage
        run: |
          cover -delete
          HARNESS_PERL_SWITCHES=-MDevel::Cover prove -lr t
          report="$(cover -report text -select_re '^lib/' -coverage statement -coverage subroutine)"
          printf '%s\n' "$report"
          printf '%s\n' "$report" | grep -F "Total                                       100.0  100.0  100.0"
