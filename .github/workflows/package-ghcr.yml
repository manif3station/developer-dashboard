name: Package GHCR

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: package-ghcr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4  # v4.2.2 - Node.js 24 compatible

      - name: Prepare OCI Dockerfile
        run: |
          cat <<EOF > scorecard-ghcr.Dockerfile
          FROM scratch
          LABEL org.opencontainers.image.title="Developer Dashboard"
          LABEL org.opencontainers.image.description="Repository snapshot packaged for GitHub Container Registry"
          LABEL org.opencontainers.image.source="https://github.com/${{ github.repository }}"
          COPY . /developer-dashboard
          EOF

      - name: Login to GHCR
        uses: docker/login-action@v3  # v3.4.0 - Node.js 24 compatible
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish OCI package
        uses: docker/build-push-action@v6  # v6.12.0 - Node.js 24 compatible
        with:
          context: .
          file: ./scorecard-ghcr.Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/developer-dashboard:${{ github.ref_type == 'tag' && github.ref_name || 'latest' }}
