name: Package GHCR

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: package-ghcr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Prepare OCI Dockerfile
        run: |
          cat <<'EOF' > scorecard-ghcr.Dockerfile
          FROM scratch
          LABEL org.opencontainers.image.title="Developer Dashboard"
          LABEL org.opencontainers.image.description="Repository snapshot packaged for GitHub Container Registry"
          LABEL org.opencontainers.image.source="https://github.com/${GITHUB_REPOSITORY}"
          COPY . /developer-dashboard
          EOF

      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish OCI package
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          file: ./scorecard-ghcr.Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/developer-dashboard:${{ github.ref_type == 'tag' && github.ref_name || 'latest' }}
