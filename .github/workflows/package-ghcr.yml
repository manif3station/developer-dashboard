name: Package GHCR

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: package-ghcr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v5.2.2

      - name: Prepare OCI Dockerfile
        run: |
          cat <<EOF > scorecard-ghcr.Dockerfile
          FROM scratch
          LABEL org.opencontainers.image.title="Developer Dashboard"
          LABEL org.opencontainers.image.description="Repository snapshot packaged for GitHub Container Registry"
          LABEL org.opencontainers.image.source="https://github.com/${{ github.repository }}"
          COPY . /developer-dashboard
          EOF

      - name: Login to GHCR
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567  # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish OCI package
        uses: docker/build-push-action@48aba3b46d1b1fec4febb7c5d0c644b249a11355  # v6.10.0
        with:
          context: .
          file: ./scorecard-ghcr.Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/developer-dashboard:${{ github.ref_type == 'tag' && github.ref_name || 'latest' }}
