name: Release To CPAN

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: release-cpan-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PAUSE_USER: ${{ secrets.PAUSE_USER }}
      PAUSE_PASS: ${{ secrets.PAUSE_PASS }}
      PERL_MM_USE_DEFAULT: 1
      NONINTERACTIVE_TESTING: 1
      PERL_EXTUTILS_AUTOINSTALL: --defaultdeps
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Setup Perl
        uses: shogo82148/actions-setup-perl@5a2f3b681f2e2fa0db6cc52c7608d9916527aa58
        with:
          perl-version: '5.38'

      - name: Install release dependencies
        run: |
          cpanm --installdeps --notest .
          cpanm --notest Devel::Cover
          cpanm --notest Capture::Tiny
          cpanm --notest Sub::Install Data::OptList Params::Util
          cpanm --notest Sub::Exporter Sub::Exporter::Util
          cpanm --notest Module::Runtime Try::Tiny Module::Implementation
          cpanm --notest Dist::CheckConflicts Package::Stash::XS Package::Stash Class::Load
          cpanm --notest Getopt::Long Getopt::Long::Descriptive
          cpanm --notest IO::TieCombine String::RewritePrefix Module::Pluggable::Object
          cpanm --notest App::Cmd
          cpanm --notest Dist::Zilla
          cpanm --notest Dist::Zilla::Plugin::ManifestSkip
          cpanm --notest Dist::Zilla::Plugin::MetaProvides::Package
          cpanm --notest Dist::Zilla::Plugin::PkgVersion
          cpanm --notest CPAN::Uploader

      - name: Run tests
        run: |
          prove -lr t

      - name: Verify coverage
        run: |
          cover -delete
          HARNESS_PERL_SWITCHES=-MDevel::Cover prove -lr t
          report="$(cover -report text -select_re '^lib/' -coverage statement -coverage subroutine)"
          printf '%s\n' "$report"
          printf '%s\n' "$report" | grep -F "Total                                       100.0  100.0  100.0"

      - name: Build distribution tarball
        run: |
          dzil build

      - name: Locate distribution artifact
        id: artifact
        shell: bash
        run: |
          set -euo pipefail
          artifact="$(ls -1t Developer-Dashboard-*.tar.gz | head -n 1)"
          if [ -z "${artifact}" ]; then
            echo "No distribution tarball was created" >&2
            exit 1
          fi
          echo "artifact=${artifact}" >> "$GITHUB_OUTPUT"

      - name: Upload to PAUSE
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${PAUSE_USER:-}" ] || [ -z "${PAUSE_PASS:-}" ]; then
            echo "PAUSE_USER and PAUSE_PASS secrets are required" >&2
            exit 1
          fi
          cpan-upload -u "$PAUSE_USER" -p "$PAUSE_PASS" "${{ steps.artifact.outputs.artifact }}"
