name: GitHub Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: release-github-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PERL_MM_USE_DEFAULT: 1
      NONINTERACTIVE_TESTING: 1
      PERL_EXTUTILS_AUTOINSTALL: --defaultdeps
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v5.2.2

      - name: Setup Perl
        uses: shogo82148/actions-setup-perl@3d3cb73ca65d657a809d97eab324d4e4f140bf5e  # v1.32.0
        with:
          perl-version: '5.38'

      - name: Install release dependencies
        run: |
          cpanm --installdeps --notest .
          cpanm --notest Devel::Cover
          cpanm --notest Capture::Tiny
          cpanm --notest Sub::Install Data::OptList Params::Util
          cpanm --notest Sub::Exporter Sub::Exporter::Util
          cpanm --notest Module::Runtime Try::Tiny Module::Implementation
          cpanm --notest Dist::CheckConflicts Package::Stash::XS Package::Stash Class::Load
          cpanm --notest Getopt::Long Getopt::Long::Descriptive
          cpanm --notest IO::TieCombine String::RewritePrefix Module::Pluggable::Object
          cpanm --notest App::Cmd
          cpanm --notest Dist::Zilla
          cpanm --notest Dist::Zilla::Plugin::ManifestSkip
          cpanm --notest Dist::Zilla::Plugin::MetaProvides::Package
          cpanm --notest Dist::Zilla::Plugin::PkgVersion
          cpanm --notest Dist::Zilla::Plugin::ShareDir
          cpanm --notest File::ShareDir::Install

      - name: Run tests
        run: |
          prove -lr t

      - name: Verify lib coverage
        run: |
          cover -delete
          HARNESS_PERL_SWITCHES=-MDevel::Cover prove -lr t
          report="$(cover -report text -select_re '^lib/' -coverage statement -coverage subroutine)"
          printf '%s\n' "$report"
          printf '%s\n' "$report" | grep -E '^Total[[:space:]]+100\.0[[:space:]]+100\.0[[:space:]]+100\.0$'

      - name: Build distribution tarball
        run: |
          dzil build

      - name: Locate distribution artifact
        id: artifact
        shell: bash
        run: |
          set -euo pipefail
          artifact="$(ls -1t Developer-Dashboard-*.tar.gz | head -n 1)"
          if [ -z "${artifact}" ]; then
            echo "No distribution tarball was created" >&2
            exit 1
          fi
          base="$(basename "${artifact}")"
          checksum="${base}.sha256"
          signature="${base}.asc"
          sha256sum "${artifact}" > "${checksum}"
          echo "artifact=${artifact}" >> "$GITHUB_OUTPUT"
          echo "base=${base}" >> "$GITHUB_OUTPUT"
          echo "checksum=${checksum}" >> "$GITHUB_OUTPUT"
          echo "signature=${signature}" >> "$GITHUB_OUTPUT"

      - name: Generate detached release signature
        shell: bash
        run: |
          set -euo pipefail
          export GNUPGHOME="$(mktemp -d)"
          cat > "${RUNNER_TEMP}/gpg-batch.conf" <<'EOF'
          %no-protection
          Key-Type: RSA
          Key-Length: 3072
          Subkey-Type: RSA
          Subkey-Length: 3072
          Name-Real: GitHub Actions Release Signing
          Name-Email: actions@users.noreply.github.com
          Expire-Date: 1d
          %commit
          EOF
          gpg --batch --generate-key "${RUNNER_TEMP}/gpg-batch.conf"
          gpg --batch --yes --armor --output "${{ steps.artifact.outputs.signature }}" --detach-sign "${{ steps.artifact.outputs.artifact }}"

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release upload "${tag}" --clobber \
              "${{ steps.artifact.outputs.artifact }}" \
              "${{ steps.artifact.outputs.checksum }}" \
              "${{ steps.artifact.outputs.signature }}"
          else
            gh release create "${tag}" \
              "${{ steps.artifact.outputs.artifact }}" \
              "${{ steps.artifact.outputs.checksum }}" \
              "${{ steps.artifact.outputs.signature }}" \
              --generate-notes \
              --title "${tag}"
          fi
