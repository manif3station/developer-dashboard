name = Developer-Dashboard
version = 1.17
author = Developer Dashboard Contributors
license = Perl_5
copyright_holder = Developer Dashboard Contributors

[GatherDir]
exclude_match = ^[O][L][D]_CODE/
exclude_match = ^\.github/
exclude_filename = dist.ini
exclude_filename = Makefile.PL
exclude_filename = ELLEN.md
exclude_filename = SOFTWARE_SPEC.md
exclude_match = ^examples/

[PruneCruft]

[ManifestSkip]

[MetaYAML]

[MetaJSON]

[MetaProvides::Package]

[MetaResources]
homepage = https://github.mf/manif3station/developer-dashboard
bugtracker.web = https://github.mf/manif3station/developer-dashboard/issues
repository.url = git@github.mf:manif3station/developer-dashboard.git
repository.web = https://github.mf/manif3station/developer-dashboard
repository.type = git

[License]

[ExecDir]

[MakeMaker]

[Manifest]

[PkgVersion]

[AutoPrereqs]

[Prereqs]
perl = 5.038
JSON::XS = 0
Dancer2 = 0
Plack = 0
Starman = 0

[Prereqs / TestRequires]
Test::More = 0
